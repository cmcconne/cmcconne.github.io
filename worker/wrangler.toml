# Optional overrides (sensible defaults are baked into live-game.js):
# [vars]
# ALLOW_ORIGIN = "https://cmcconne.github.io"
# PLATFORM = "na1"
# REGION = "americas"
# GAME_NAME = "Naked and Afraid"
# TAG_LINE = "lost"
