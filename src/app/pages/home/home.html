<section class="hero">
  <p class="eyebrow">Personal showcase</p>
  <h1>Charlie McConnell</h1>
  <p class="lead">
    Gamer, brewer, and lifelong hobbyist. Here's a look at the worlds I spend my
    time in.
  </p>
</section>

<section class="grid" aria-label="Sections">
  @for (section of sections(); track section.slug) {
    <a
      class="card"
      [routerLink]="['/', section.slug]"
      [style.--card-accent]="section.accent"
    >
      <span class="icon" aria-hidden="true">{{ section.icon }}</span>
      <h2>{{ section.name }}</h2>
      <p class="tagline">{{ section.tagline }}</p>
      <span class="explore">Explore →</span>
    </a>
  }
</section>
