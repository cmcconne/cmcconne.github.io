<nav class="showcase" aria-label="Sections">
  @for (section of sections(); track section.slug) {
    <a
      class="showcase-item"
      [routerLink]="['/', section.slug]"
      [style.--accent]="section.accent"
    >
      @if (section.logoImage) {
        <img class="showcase-logo" [src]="section.logoImage" [alt]="section.name" />
      } @else {
        <span class="showcase-emoji" aria-hidden="true">{{ section.icon }}</span>
        <span class="showcase-name">{{ section.name }}</span>
      }
      <span class="showcase-tagline">{{ section.tagline }}</span>
    </a>
  }
</nav>
