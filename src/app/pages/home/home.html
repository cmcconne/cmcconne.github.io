<section class="hero">
  <h1>Charlie's Hall of Fame</h1>
  <p>Celebrating the people worth remembering.</p>
</section>

<section class="grid" aria-label="Inductees">
  @for (inductee of inductees(); track inductee.slug) {
    <a class="card" [routerLink]="['/inductee', inductee.slug]">
      <span class="year">{{ inductee.yearInducted }}</span>
      <h2>{{ inductee.name }}</h2>
      <p class="title">{{ inductee.title }}</p>
    </a>
  } @empty {
    <p class="empty">No inductees yet.</p>
  }
</section>
