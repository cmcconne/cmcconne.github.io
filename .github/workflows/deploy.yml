name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Refresh live stats every 6 hours.
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pulls real LoL stats into public/lol-stats.json. No-ops without the
      # secret; a failed fetch (e.g. expired key) leaves the placeholder intact.
      - name: Fetch League of Legends stats
        continue-on-error: true
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: node scripts/fetch-lol-stats.mjs

      # Public OSRS Hiscores — no key needed. On failure the committed data stays.
      - name: Fetch RuneScape stats
        continue-on-error: true
        run: node scripts/fetch-runescape-stats.mjs

      # Enrich curated MTG decks with Scryfall art. No key needed.
      - name: Fetch Magic decks
        continue-on-error: true
        run: node scripts/fetch-mtg-decks.mjs

      # Public TopDeck profile stats — no key needed.
      - name: Fetch TopDeck results
        continue-on-error: true
        run: node scripts/fetch-topdeck.mjs

      - name: Build
        run: npm run build -- --configuration production --base-href /

      # Client-side routes (e.g. /inductee/:slug) 404 on Pages without this:
      # a 404.html copy lets GitHub Pages serve the SPA for any deep link.
      - name: Add SPA 404 fallback
        run: cp dist/charlies-hall-of-fame/browser/index.html dist/charlies-hall-of-fame/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/charlies-hall-of-fame/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
